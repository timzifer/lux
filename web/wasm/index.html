<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lux App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading { position: absolute; inset: 0; display: flex; align-items: center;
                   justify-content: center; color: #e0e0e0; font-family: system-ui; font-size: 1.1rem; }
        #error { position: absolute; inset: 0; display: none; align-items: center;
                 justify-content: center; color: #ff6b6b; font-family: system-ui; font-size: 1.1rem;
                 padding: 2rem; text-align: center; }
        #status { position: fixed; bottom: 8px; left: 8px; color: #888; font-family: monospace;
                  font-size: 11px; z-index: 100; pointer-events: none; white-space: pre-line; }
    </style>
</head>
<body>
    <canvas id="lux-canvas"></canvas>
    <div id="loading">Loading Lux application&hellip;</div>
    <div id="error"></div>
    <div id="status"></div>
    <script src="wasm_exec.js"></script>
    <script>
        // Exposed to Go via js.Global().Call("luxStatus", msg).
        window.luxStatus = function(msg) {
            const el = document.getElementById("status");
            if (el) el.textContent = msg;
        };
        window.addEventListener("error", (e) => {
            console.error("Uncaught error:", e.error || e.message);
            const errorDiv = document.getElementById("error");
            if (errorDiv) {
                errorDiv.style.display = "flex";
                errorDiv.textContent = "JS Error: " + (e.error?.message || e.message);
            }
        });
        window.addEventListener("unhandledrejection", (e) => {
            console.error("Unhandled rejection:", e.reason);
            const errorDiv = document.getElementById("error");
            if (errorDiv) {
                errorDiv.style.display = "flex";
                errorDiv.textContent = "Unhandled Promise rejection: " + e.reason;
            }
        });

        (async () => {
            const loading = document.getElementById("loading");
            const errorDiv = document.getElementById("error");

            if (!navigator.gpu) {
                loading.style.display = "none";
                errorDiv.style.display = "flex";
                errorDiv.textContent = "WebGPU is not supported in this browser. Please use Chrome 113+, Firefox 128+, or Safari 18+.";
                return;
            }

            try {
                const go = new Go();
                const result = await WebAssembly.instantiateStreaming(fetch("app.wasm"), go.importObject);
                loading.style.display = "none";
                console.log("WASM loaded, starting Go...");
                go.run(result.instance).then(() => {
                    console.log("Go program exited normally");
                }).catch((err) => {
                    console.error("Go program crashed:", err);
                    errorDiv.style.display = "flex";
                    errorDiv.textContent = "Go crashed: " + err;
                });
            } catch (err) {
                loading.style.display = "none";
                errorDiv.style.display = "flex";
                errorDiv.textContent = "Failed to load WASM: " + err.message;
            }
        })();
    </script>
</body>
</html>
