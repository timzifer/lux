name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: >
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/timzifer/lux/blob/main/.github/CLA.md'
          branch: 'main'
          allowlist: 'timzifer,dependabot[bot]'
          remote-organization-name: 'timzifer'
          remote-repository-name: 'lux-cla-signatures'
          custom-notsigned-prcomment: >
            Thank you for your contribution to **lux**! Before we can
            merge this pull request, we need you to agree to the
            Contributor License Agreement (CLA). It grants the Project
            the rights needed to distribute your contribution under
            both the noncommercial and commercial licenses.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: >
            All Contributors have signed the CLA. Thanks!
