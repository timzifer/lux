name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build -tags nogui ./...

      - name: Vet
        run: go vet -tags nogui ./...

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install race detector
        run: go install github.com/kolkov/racedetector/cmd/racedetector@latest

      - name: Run unit tests
        run: |
          racedetector test -tags nogui -count=1 -timeout=10m \
            $(go list -tags nogui ./... | grep -v /vendor_gogpu_wgpu/ | grep -v /uitest)

  ui-tests:
    name: UI Tests (Golden Files)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run UI golden-file tests
        run: go test -tags nogui -v -count=1 -timeout=10m ./uitest/...
