name: Bug report
description: Report something that does not work as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as
        much as you can — reproducible reports get fixed faster.

        For security-sensitive issues, do **not** file a public
        report here. See [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal code or commands that reproduce the problem.
      placeholder: |
        1. go run ./examples/...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, stack traces, or screenshots.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: lux version / commit
      description: Tag, release, or commit SHA.
    validations:
      required: true

  - type: input
    id: go
    attributes:
      label: Go version
      description: Output of `go version`.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other / embedded
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Platform backend
      options:
        - GLFW
        - Win32
        - Cocoa
        - X11
        - Wayland
        - DRM/KMS
        - WebGPU / WASM
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: GPU, driver versions, display server, anything else
        that might matter.
