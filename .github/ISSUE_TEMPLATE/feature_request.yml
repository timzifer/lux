name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Larger design changes are usually best discussed as an RFC in
        [`docs/rfc/`](../docs/rfc/) before implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Describe the
        use case, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why are
        they not sufficient?

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, prior art, sketches, related issues.
